<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Módulo Diagnóstico - Delito</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

#panel {
    position:absolute;
    left:10px;
    top:10px;
    z-index:1000;
    background:#1e1e1e;
    color:#fff;
    padding:15px;
    border-radius:8px;
    width:320px;
}

#panel h3 { margin-top:0; }

#panel label { font-size:12px; margin-top:6px; display:block; }

#panel input, #panel select {
    width:100%;
    padding:5px;
    border-radius:4px;
    border:none;
    margin-top:3px;
}

#panel button {
    width:100%;
    padding:6px;
    margin-top:6px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
}

#badge_moran {
    margin-top:10px;
    padding:6px;
    border-radius:4px;
    text-align:center;
    font-weight:bold;
}

#contador_puntos {
    margin-top:6px;
    font-size:13px;
}

.legend {
    position:absolute;
    right:10px;
    bottom:20px;
    z-index:1000;
    background:white;
    padding:10px;
    border-radius:6px;
    font-size:12px;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">

  <h3>Diagnóstico</h3>

  <label>Fecha Inicio</label>
  <input type="date" id="f_ini">

  <label>Fecha Fin</label>
  <input type="date" id="f_fin">

  <label>Delito</label>
  <select id="sel_delito"></select>

  <label>Modalidad</label>
  <select id="sel_modalidad"></select>

  <button onclick="cargarHeatmap()">Heatmap</button>
  <button onclick="cargarGI()">Getis-Ord Gi*</button>
  <button onclick="cargarMoran()">Moran Global</button>
  <button onclick="togglePuntos()">Mostrar/Ocultar Puntos</button>

  <div id="badge_moran"></div>
  <div id="contador_puntos"></div>

</div>

<!-- ✅ Leyenda hardcodeada: siempre visible -->
<div id="leyenda" class="legend">
  <b>Hotspots / Coldspots</b><br><br>

  <div style="display:flex;align-items:center;margin-bottom:4px;">
    <div style="width:15px;height:15px;background:#b71c1c;margin-right:6px;"></div>
    Hotspot 99%
  </div>

  <div style="display:flex;align-items:center;margin-bottom:4px;">
    <div style="width:15px;height:15px;background:#ef5350;margin-right:6px;"></div>
    Hotspot 95%
  </div>

  <div style="display:flex;align-items:center;margin-bottom:4px;">
    <div style="width:15px;height:15px;background:#0d47a1;margin-right:6px;"></div>
    Coldspot 99%
  </div>

  <div style="display:flex;align-items:center;margin-bottom:4px;">
    <div style="width:15px;height:15px;background:#64b5f6;margin-right:6px;"></div>
    Coldspot 95%
  </div>

  <div style="display:flex;align-items:center;margin-bottom:4px;">
    <div style="width:15px;height:15px;background:#bdbdbd;margin-right:6px;"></div>
    No significativo
  </div>

  <div style="display:flex;align-items:center;margin-bottom:4px;">
    <div style="width:15px;height:15px;background:#9e9e9e;margin-right:6px;"></div>
    Sin eventos
  </div>
</div>

<script>
// =============================
// MAPA
// =============================
var map = L.map('map').setView([-34.61, -58.44], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

let heatLayer = null;
let giLayer = null;
let puntosLayer = null;


// =============================
// PARAMETROS
// =============================
function getParams(){
    const ini = document.getElementById("f_ini").value;
    const fin = document.getElementById("f_fin").value;
    const delito = document.getElementById("sel_delito").value;
    const modalidad = document.getElementById("sel_modalidad").value;

    return `fecha_inicio=${ini}&fecha_fin=${fin}&delito=${delito}&modalidad=${modalidad}`;
}


// =============================
// HEATMAP
// =============================
async function cargarHeatmap(){

    const btn = event.target;

    if(heatLayer){
        map.removeLayer(heatLayer);
        heatLayer = null;
        btn.classList.remove("active");
        return;
    }

    const res = await fetch(`/api/diagnostico/heatmap?${getParams()}`);
    const data = await res.json();

    heatLayer = L.heatLayer(data.points, {
        radius: 25,
        blur: 20,
        maxZoom: 17
    }).addTo(map);

    btn.classList.add("active");
}


// =============================
// GI*
// =============================
async function cargarGI(){
    const res = await fetch(`/api/diagnostico/gi?${getParams()}`);
    const data = await res.json();

    giLayer = L.geoJSON(data, {
        style: function(feature){
            return {
                fillColor: feature.properties.color,
                color:"#333",
                weight:0.3,
                fillOpacity:0.7
            };
        }
    }).addTo(map);
}


// =============================
// MORAN
// =============================
async function cargarMoran(){
    const res = await fetch(`/api/diagnostico/moran?${getParams()}`);
    const data = await res.json();

    const badge = document.getElementById("badge_moran");
    badge.innerHTML = data.estado;
    badge.style.background = data.color;
}


// =============================
// PUNTOS REALES
// =============================
async function togglePuntos(){

    const btn = event.target;

    if(puntosLayer){
        map.removeLayer(puntosLayer);
        puntosLayer = null;
        document.getElementById("contador_puntos").innerHTML = "";
        btn.classList.remove("active");
        return;
    }

    const res = await fetch(`/api/diagnostico/puntos?${getParams()}`);
    const data = await res.json();

    puntosLayer = L.layerGroup();

    data.points.forEach(p=>{
        L.circleMarker(p,{
            radius:3,
            color:"#000",
            fillColor:"#ff0000",
            fillOpacity:0.6
        }).addTo(puntosLayer);
    });

    puntosLayer.addTo(map);

    document.getElementById("contador_puntos").innerHTML =
        "Eventos evaluados: <b>" + data.total + "</b>";

    btn.classList.add("active");
}



// =============================
// CARGAR CATALOGOS DINAMICOS
// =============================
async function cargarCatalogos(){

    const res = await fetch("/api/catalogos");
    const data = await res.json();

    const selDelito = document.getElementById("sel_delito");
    const selModalidad = document.getElementById("sel_modalidad");

    selDelito.innerHTML = '<option value="ALL">Todos</option>';
    selModalidad.innerHTML = '<option value="ALL">Todas</option>';

    data.delitos.forEach(d=>{
        const opt = document.createElement("option");
        opt.value = d;
        opt.text = d;
        selDelito.appendChild(opt);
    });

    data.modalidades.forEach(m=>{
        const opt = document.createElement("option");
        opt.value = m;
        opt.text = m;
        selModalidad.appendChild(opt);
    });
}


// =============================
// DEFAULTS
// =============================
document.getElementById("f_ini").value = "2024-01-01";
document.getElementById("f_fin").value = "2024-01-31";

cargarCatalogos();
</script>


#panel button.active {
    background-color: #1976d2;
    color: white;
}

</body>
</html>
