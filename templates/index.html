<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Delito - Diagnóstico + Predicción</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }

/* Panel izquierdo */
#panel-left {
    position:absolute;
    left:10px;
    top:10px;
    z-index:1000;
    background:#1e1e1e;
    color:#fff;
    padding:15px;
    border-radius:8px;
    width:320px;
}

/* Panel derecho */
#panel-right {
    position:absolute;
    right:10px;
    top:10px;
    z-index:1000;
    background:#ffffff;
    color:#111;
    padding:15px;
    border-radius:8px;
    width:340px;
    box-shadow:0 0 8px rgba(0,0,0,0.25);
}

h3 { margin:0 0 10px 0; }
label { font-size:12px; margin-top:6px; display:block; }

input, select {
    width:100%;
    padding:6px;
    border-radius:4px;
    border:1px solid #ddd;
    margin-top:3px;
}

button {
    width:100%;
    padding:8px;
    margin-top:8px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
}

button.active {
    background-color:#1976d2 !important;
    color:white !important;
}

.small { font-size:12px; }
hr { border:none; border-top:1px solid #eee; margin:10px 0; }

.legend-box {
    margin-top:10px;
    padding:10px;
    border:1px solid #eee;
    border-radius:6px;
    background:#fafafa;
    font-size:12px;
}

.row { display:flex; align-items:center; margin-bottom:6px; }
.swatch {
    width:16px; height:16px;
    border-radius:3px;
    margin-right:8px;
    border:1px solid #ddd;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- =============================
     PANEL IZQUIERDO (Diagnóstico)
============================= -->
<div id="panel-left">
  <h3>Diagnóstico</h3>

  <label>Fecha Inicio</label>
  <input type="date" id="f_ini">

  <label>Fecha Fin</label>
  <input type="date" id="f_fin">

  <label>Delito</label>
  <select id="sel_delito"></select>

  <label>Modalidad</label>
  <select id="sel_modalidad"></select>

  <button id="btn-heat" onclick="toggleHeatmap(event)">Heatmap</button>
  <button id="btn-gi" onclick="toggleGI(event)">Getis-Ord Gi*</button>
  <button onclick="cargarMoran()">Moran Global</button>
  <button id="btn-puntos" onclick="togglePuntos(event)">Mostrar/Ocultar Puntos</button>

  <div id="badge_moran"></div>
  <div id="contador_puntos"></div>
</div>

<!-- =============================
     PANEL DERECHO (Predicción)
============================= -->
<div id="panel-right">

  <h3>Predicción</h3>

  <div class="small">
    T se toma automáticamente como el último día disponible.<br>
    Modelo ALL (criminalidad agregada).
  </div>

  <hr>

  <div class="small">
    <b>Estado del Modelo</b><br>
    Último dato (T): <span id="pred-fecha-base">--</span><br>
    Modelo entrenado: <span id="pred-fecha-entrenado">No</span>
  </div>

  <button id="btn-train" onclick="entrenarModelo()">Entrenar Modelo</button>

  <hr>

  <label>Horizonte (días)</label>
  <select id="horizonte">
    <option value="1">1 día</option>
    <option value="3">3 días</option>
    <option value="7" selected>7 días</option>
  </select>

  <button id="btn-pred" onclick="togglePrediccion(event)">Ver Predicción</button>

  <div style="margin-top:10px;">
    <div class="small"><b>Resumen</b></div>
    <div class="small" id="pred-resumen">Sin predicción cargada.</div>
  </div>

  <div class="legend-box">
    <div class="small"><b>Leyenda riesgo (0–100%)</b></div>
    <div style="height:6px;"></div>

    <div class="row"><div class="swatch" style="background:#d73027;"></div> Alto (≥ 70%)</div>
    <div class="row"><div class="swatch" style="background:#fc8d59;"></div> Medio (50–69%)</div>
    <div class="row"><div class="swatch" style="background:#fee08b;"></div> Bajo (30–49%)</div>
    <div class="row"><div class="swatch" style="background:#d9d9d9;"></div> Muy bajo (&lt; 30%)</div>
  </div>

</div>

<script>

// =============================
// MAPA
// =============================
var map = L.map('map').setView([-34.61, -58.44], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let predLayer = null;

// =============================
// ESTADO MODELO
// =============================
async function cargarEstadoModelo(){
  const res = await fetch("/api/prediccion/status");
  const data = await res.json();

  document.getElementById("pred-fecha-base").innerHTML =
    data.fecha_base || "--";

  document.getElementById("pred-fecha-entrenado").innerHTML =
    data.modelo_entrenado ? "Sí" : "No";
}

// =============================
// ENTRENAR MODELO
// =============================
async function entrenarModelo(){

  const btn = document.getElementById("btn-train");
  btn.innerHTML = "Entrenando...";
  btn.disabled = true;

  try{
    const res = await fetch("/api/prediccion/train");
    const data = await res.json();

    document.getElementById("pred-fecha-entrenado").innerHTML = "Sí";
    document.getElementById("pred-fecha-base").innerHTML =
      data.meta.cutoff_date;

    alert("Modelo entrenado.\nAUC: " + data.meta.roc_auc.toFixed(3));
  } catch(e){
    alert("Error entrenando modelo.");
  }

  btn.innerHTML = "Entrenar Modelo";
  btn.disabled = false;
}

// =============================
// PREDICCIÓN
// =============================
async function togglePrediccion(ev){

  const btn = ev.target;

  if(predLayer){
    map.removeLayer(predLayer);
    predLayer = null;
    btn.classList.remove("active");
    document.getElementById("pred-resumen").innerHTML =
      "Sin predicción cargada.";
    return;
  }

  const horizonte = document.getElementById("horizonte").value;

  const res = await fetch(`/api/prediccion?horizonte=${horizonte}`);
  const data = await res.json();

  predLayer = L.geoJSON(data, {
    style: (f) => ({
      fillColor: f.properties.color,
      color:"#111",
      weight:0.4,
      fillOpacity:0.55
    }),
    onEachFeature: (feature, layer) => {
      layer.bindPopup(
        `<b>Celda:</b> ${feature.properties.id_celda}<br>` +
        `<b>Riesgo:</b> ${feature.properties.riesgo_pct}%`
      );
    }
  }).addTo(map);

  document.getElementById("pred-resumen").innerHTML =
    `<b>T:</b> ${data.fecha_base}<br>` +
    `<b>Horizonte:</b> ${horizonte} día(s)<br>` +
    `<b>Celdas:</b> ${data.features.length}`;

  btn.classList.add("active");
}

// =============================
cargarEstadoModelo();

</script>

</body>
</html>
